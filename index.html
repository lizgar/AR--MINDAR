<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <title>Ejemplo AR - UI 2026</title>
</head>
<body>
     <a-scene mindar-image="imageTargetSrc: https://lizgar.github.io/AR--MINDAR/targets.mind;" 
              color-space="sRGB" 
              renderer="colorManagement: true, physicallyCorrectLights" 
              vr-mode-ui="enabled: false" 
              device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="card" src="https://lizgar.github.io/AR--MINDAR/modelos/Mew_Front.png" />
        <a-asset-item id="avatarModel" src="https://lizgar.github.io/A3D/valentinos_gltf/scene.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
        <a-gltf-model 
        rotation="0 0 0 " 
        position="0 0 0.1" 
        scale="0.005 0.005 0.005" 
        src="#avatarModel" 
        animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
      </a-entity>
    </a-scene>
    
</body>
</html>
